
<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI 影棚 - Professional Consistency Studio</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --studio-bg: #0b0d12;
        --studio-panel: #0f1118;
        --studio-panel-2: #121621;
        --studio-border: rgba(255, 255, 255, 0.12);
        --studio-text: #e7eaf0;
        --studio-muted: #8f96a5;
        --studio-accent: #f6ad1f;
      }
      body {
        font-family: 'Space Grotesk', 'Noto Sans SC', sans-serif;
        background:
          radial-gradient(1200px 360px at 50% -10%, rgba(246, 173, 31, 0.09), transparent 60%),
          radial-gradient(900px 280px at 85% -5%, rgba(56, 189, 248, 0.05), transparent 65%),
          var(--studio-bg);
        color: var(--studio-text);
      }
      /* Custom Scrollbar */
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #18181b; 
      }
      ::-webkit-scrollbar-thumb {
        background: #3f3f46; 
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #52525b; 
      }
      .glass-panel {
        background: rgba(24, 24, 27, 0.7);
        backdrop-filter: blur(12px);
        border: 1px solid rgba(255, 255, 255, 0.08);
      }
      
      /* --- FILM DEVELOPING EFFECTS --- */
      @keyframes film-develop {
        0% { background-position: 200% 0; opacity: 0.3; }
        100% { background-position: -200% 0; opacity: 0.8; }
      }
      
      .animate-film-develop {
        background: linear-gradient(90deg, 
            rgba(255,255,255,0) 0%, 
            rgba(245, 158, 11, 0.1) 25%, 
            rgba(245, 158, 11, 0.2) 50%, 
            rgba(245, 158, 11, 0.1) 75%, 
            rgba(255,255,255,0) 100%
        );
        background-size: 200% 100%;
        animation: film-develop 3s infinite linear;
      }

      @keyframes grain {
        0%, 100% { transform: translate(0, 0); }
        10% { transform: translate(-5%, -10%); }
        20% { transform: translate(-15%, 5%); }
        30% { transform: translate(7%, -25%); }
        40% { transform: translate(-5%, 25%); }
        50% { transform: translate(-15%, 10%); }
        60% { transform: translate(15%, 0%); }
        70% { transform: translate(0%, 15%); }
        80% { transform: translate(3%, 35%); }
        90% { transform: translate(-10%, 10%); }
      }

      .bg-grain {
        position: relative;
        overflow: hidden;
      }
      .bg-grain::before {
        content: "";
        position: absolute;
        top: -150%;
        left: -150%;
        width: 300%;
        height: 300%;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)' opacity='0.15'/%3E%3C/svg%3E");
        animation: grain 8s steps(10) infinite;
        pointer-events: none;
        opacity: 0.3;
      }

      @keyframes progress {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-progress {
        animation: progress 1.8s ease-in-out infinite;
      }

      @keyframes shimmer-x {
        0% { transform: translateX(-120%); }
        100% { transform: translateX(120%); }
      }
      .animate-shimmer-x {
        animation: shimmer-x 1.9s linear infinite;
      }

      @keyframes scanline {
        0% { transform: translateX(-100%); opacity: 0; }
        20% { opacity: 0.4; }
        80% { opacity: 0.2; }
        100% { transform: translateX(100%); opacity: 0; }
      }
      .animate-scanline {
        animation: scanline 2.8s linear infinite;
      }

      @keyframes rise-fade {
        0% { transform: translateY(6px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      .animate-rise-fade {
        animation: rise-fade 420ms ease-out both;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
