<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI影像工坊 - 专业创作工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --ui-bg: #0e0e10;
        --ui-app: #111214;
        --ui-surface: #17181b;
        --ui-surface-soft: #1c1d21;
        --ui-border: rgba(255, 255, 255, 0.12);
        --ui-border-strong: rgba(255, 255, 255, 0.24);
        --ui-accent: #d9cdb8;
        --ui-accent-soft: rgba(217, 205, 184, 0.14);
        --ui-success: #9eb38b;
        --ui-warning: #a79b8b;
        --ui-text-primary: #f1ece3;
        --ui-text-secondary: #d4cdc1;
        --ui-text-muted: #8b8579;
        --ui-text-inverse: #141414;
        --ui-radius-sm: 8px;
        --ui-radius-md: 10px;
        --ui-radius-lg: 12px;
        --ui-radius-pill: 999px;
        --ui-space-1: 4px;
        --ui-space-2: 8px;
        --ui-space-3: 12px;
        --ui-space-4: 16px;
        --ui-space-5: 24px;
        --ui-space-6: 32px;
        --ui-font-title: 16px;
        --ui-font-body: 13px;
        --ui-font-meta: 11px;
        --ui-btn-h: 34px;
        --ui-btn-h-compact: 29px;
        --ui-control-h: 34px;
        --ui-control-h-compact: 30px;
        --ui-textarea-min-h: 160px;
        --ui-header-h: 50px;
        --ui-hero-max: 680px;
        --ui-layout-pad-x: 12px;
        --ui-layout-pad-y: 12px;
        --ui-side-panel-w: 272px;
        --ui-history-w: 320px;
        --ui-modal-max: 520px;
        --ui-lightbox-max: 1120px;
        --ui-shadow-sm: 0 6px 18px rgba(0, 0, 0, 0.38);
        --ui-shadow-md: 0 14px 34px rgba(0, 0, 0, 0.52);
        --ui-motion-fast: 160ms;
        --ui-motion-base: 240ms;
        --ui-motion-slow: 360ms;
        --ui-ease-standard: cubic-bezier(0.2, 0.82, 0.2, 1);
      }
      @media (min-width: 768px) {
        :root {
          --ui-font-title: 18px;
          --ui-font-body: 14px;
          --ui-btn-h: 36px;
          --ui-btn-h-compact: 31px;
          --ui-control-h: 36px;
          --ui-control-h-compact: 32px;
          --ui-textarea-min-h: 188px;
          --ui-header-h: 54px;
          --ui-hero-max: 720px;
          --ui-layout-pad-x: 16px;
          --ui-layout-pad-y: 16px;
          --ui-side-panel-w: 280px;
          --ui-history-w: 360px;
          --ui-modal-max: 560px;
          --ui-lightbox-max: 1180px;
        }
      }
      @media (min-width: 1280px) {
        :root {
          --ui-font-title: 20px;
          --ui-font-body: 14px;
          --ui-btn-h: 38px;
          --ui-btn-h-compact: 32px;
          --ui-control-h: 38px;
          --ui-control-h-compact: 33px;
          --ui-textarea-min-h: 208px;
          --ui-header-h: 58px;
          --ui-hero-max: 760px;
          --ui-layout-pad-x: 20px;
          --ui-layout-pad-y: 20px;
          --ui-side-panel-w: 288px;
          --ui-history-w: 380px;
          --ui-modal-max: 600px;
          --ui-lightbox-max: 1240px;
        }
      }
      body {
        font-family: 'IBM Plex Sans', 'PingFang SC', 'Noto Sans SC', sans-serif;
        background: var(--ui-bg);
        color: var(--ui-text-primary);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      .ui-app {
        background:
          radial-gradient(1200px 380px at 50% -20%, rgba(217, 205, 184, 0.08), transparent 70%),
          linear-gradient(180deg, #121316 0%, #0f1012 48%, #0c0d0f 100%);
      }
      .ui-surface {
        background: var(--ui-surface);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-lg);
        box-shadow: var(--ui-shadow-sm);
        transition: box-shadow var(--ui-motion-base) var(--ui-ease-standard), border-color var(--ui-motion-base) var(--ui-ease-standard);
      }
      .ui-surface-soft {
        background: var(--ui-surface-soft);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-md);
        transition: background-color var(--ui-motion-base) var(--ui-ease-standard), border-color var(--ui-motion-base) var(--ui-ease-standard);
      }
      .ui-header {
        background: rgba(17, 18, 20, 0.88);
        border-bottom: 1px solid var(--ui-border);
        backdrop-filter: blur(8px);
      }
      .ui-title {
        font-size: var(--ui-font-title);
        color: var(--ui-text-primary);
        line-height: 1.3;
        letter-spacing: 0.01em;
      }
      .ui-meta {
        font-size: var(--ui-font-meta);
        color: var(--ui-text-muted);
      }
      .ui-btn-primary {
        height: var(--ui-btn-h);
        padding: 0 16px;
        border-radius: var(--ui-radius-sm);
        border: 1px solid #c5b8a1;
        background: var(--ui-accent);
        color: var(--ui-text-inverse);
        font-size: 12px;
        font-weight: 600;
        transition: transform var(--ui-motion-fast) var(--ui-ease-standard), box-shadow var(--ui-motion-fast) var(--ui-ease-standard), background-color var(--ui-motion-fast) var(--ui-ease-standard), border-color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-btn-primary:hover {
        background: #e3d8c7;
        border-color: #d8cbb4;
        box-shadow: 0 6px 16px rgba(217, 205, 184, 0.22);
      }
      .ui-btn-primary:active {
        transform: translateY(1px) scale(0.995);
        box-shadow: 0 2px 8px rgba(217, 205, 184, 0.18);
      }
      .ui-btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }
      .ui-btn-secondary {
        height: var(--ui-btn-h);
        padding: 0 14px;
        border-radius: var(--ui-radius-sm);
        border: 1px solid var(--ui-border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--ui-text-secondary);
        font-size: 11px;
        transition: transform var(--ui-motion-fast) var(--ui-ease-standard), border-color var(--ui-motion-fast) var(--ui-ease-standard), background-color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-btn-secondary:hover {
        border-color: var(--ui-border-strong);
        color: var(--ui-text-primary);
        background: rgba(255, 255, 255, 0.05);
      }
      .ui-btn-secondary:active {
        transform: translateY(1px);
      }
      .ui-btn-link {
        font-size: 12px;
        color: var(--ui-text-muted);
        transition: color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-btn-link:hover {
        color: var(--ui-text-secondary);
      }
      .ui-field-label {
        font-size: var(--ui-font-meta);
        color: var(--ui-text-muted);
        letter-spacing: 0.02em;
      }
      .ui-input,
      .ui-select,
      .ui-textarea {
        width: 100%;
        border-radius: var(--ui-radius-sm);
        border: 1px solid var(--ui-border);
        background: rgba(255, 255, 255, 0.02);
        color: var(--ui-text-secondary);
        font-size: var(--ui-font-body);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .ui-input,
      .ui-select {
        height: var(--ui-control-h);
        padding: 0 12px;
      }
      .ui-textarea {
        min-height: var(--ui-textarea-min-h);
        padding: 14px;
        resize: none;
        line-height: 1.7;
      }
      .ui-input:focus,
      .ui-select:focus,
      .ui-textarea:focus {
        outline: none;
        border-color: rgba(217, 205, 184, 0.46);
        box-shadow: 0 0 0 3px rgba(217, 205, 184, 0.16);
      }
      .ui-chip {
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-sm);
        background: rgba(255, 255, 255, 0.02);
        color: var(--ui-text-muted);
        font-size: 11px;
        padding: 6px 8px;
        text-align: left;
        transition: transform var(--ui-motion-fast) var(--ui-ease-standard), border-color var(--ui-motion-fast) var(--ui-ease-standard), background-color var(--ui-motion-fast) var(--ui-ease-standard), color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-chip:hover {
        border-color: var(--ui-border-strong);
        color: var(--ui-text-secondary);
        background: rgba(255, 255, 255, 0.05);
      }
      .ui-chip:active {
        transform: translateY(1px);
      }
      .ui-chip-active {
        border-color: rgba(217, 205, 184, 0.48);
        color: var(--ui-text-primary);
        background: var(--ui-accent-soft);
      }
      .ui-modal {
        background: #17181b;
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-lg);
        box-shadow: 0 18px 42px rgba(0, 0, 0, 0.48);
      }
      .ui-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: var(--ui-radius-pill);
        border: 1px solid var(--ui-border);
        background: rgba(255, 255, 255, 0.03);
        color: var(--ui-text-secondary);
        font-size: 10px;
      }
      .ui-tag-info {
        border-color: rgba(217, 205, 184, 0.34);
        background: var(--ui-accent-soft);
        color: var(--ui-accent);
      }
      .ui-tag-success {
        border-color: rgba(158, 179, 139, 0.4);
        background: rgba(158, 179, 139, 0.12);
        color: var(--ui-success);
      }
      .ui-tag-muted {
        color: var(--ui-text-muted);
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #111214;
      }
      ::-webkit-scrollbar-thumb {
        background: #4e4f53;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #65666b;
      }

      @keyframes progress {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-progress {
        animation: progress 1.8s ease-in-out infinite;
      }

      @keyframes rise-fade {
        0% { transform: translateY(6px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      .animate-rise-fade {
        animation: rise-fade 420ms ease-out both;
      }
      .ui-card-lift {
        transition: transform var(--ui-motion-base) var(--ui-ease-standard), box-shadow var(--ui-motion-base) var(--ui-ease-standard), border-color var(--ui-motion-base) var(--ui-ease-standard);
      }
      .ui-card-lift:hover {
        transform: translateY(-2px);
        box-shadow: var(--ui-shadow-md);
      }
      .ui-reveal {
        animation: rise-fade var(--ui-motion-slow) var(--ui-ease-standard) both;
      }
      .ui-numeric {
        font-variant-numeric: tabular-nums;
      }
      .ui-shell-pad {
        padding-left: var(--ui-layout-pad-x);
        padding-right: var(--ui-layout-pad-x);
        padding-top: var(--ui-layout-pad-y);
        padding-bottom: var(--ui-layout-pad-y);
      }
      .ui-header-h {
        height: var(--ui-header-h);
      }
      .ui-header-pad {
        padding-left: var(--ui-layout-pad-x);
        padding-right: var(--ui-layout-pad-x);
      }
      .ui-hero {
        max-width: var(--ui-hero-max);
      }
      .ui-modal-shell {
        width: 100%;
        max-width: var(--ui-modal-max);
      }
      .ui-history-drawer {
        width: min(92vw, var(--ui-history-w));
      }
      .ui-lightbox-body {
        width: 100%;
        max-width: var(--ui-lightbox-max);
      }
      .ui-preview-shadow {
        box-shadow: 0 18px 44px rgba(0, 0, 0, 0.62);
      }
      .ui-btn-compact {
        height: var(--ui-btn-h-compact) !important;
        font-size: 10px;
      }
      .ui-select-compact {
        height: var(--ui-control-h-compact) !important;
      }
      .ui-input-hero {
        min-height: var(--ui-textarea-min-h) !important;
      }
      .ui-planning-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: var(--ui-space-4);
      }
      @media (min-width: 1280px) {
        .ui-planning-grid {
          grid-template-columns: minmax(0, 1fr) var(--ui-side-panel-w);
        }
      }
      :focus-visible {
        outline: 2px solid rgba(217, 205, 184, 0.4);
        outline-offset: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
