<!DOCTYPE html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>AI影像工坊 - 专业创作工作台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700&family=Noto+Sans+SC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
      :root {
        --ui-bg: #f4f5f7;
        --ui-app: #f7f8fa;
        --ui-surface: #ffffff;
        --ui-surface-soft: #fafbfc;
        --ui-border: rgba(0, 0, 0, 0.08);
        --ui-border-strong: rgba(0, 0, 0, 0.14);
        --ui-accent: #07c160;
        --ui-accent-soft: rgba(7, 193, 96, 0.12);
        --ui-success: #07c160;
        --ui-warning: #8e96a6;
        --ui-text-primary: #111827;
        --ui-text-secondary: #374151;
        --ui-text-muted: #7b8597;
        --ui-text-inverse: #ffffff;
        --ui-radius-sm: 10px;
        --ui-radius-md: 14px;
        --ui-radius-lg: 18px;
        --ui-radius-pill: 999px;
        --ui-space-1: 4px;
        --ui-space-2: 8px;
        --ui-space-3: 12px;
        --ui-space-4: 16px;
        --ui-space-5: 24px;
        --ui-space-6: 32px;
        --ui-font-title: 18px;
        --ui-font-body: 14px;
        --ui-font-meta: 12px;
        --ui-btn-h: 38px;
        --ui-btn-h-compact: 32px;
        --ui-control-h: 38px;
        --ui-control-h-compact: 34px;
        --ui-textarea-min-h: 196px;
        --ui-header-h: 56px;
        --ui-hero-max: 700px;
        --ui-layout-pad-x: 14px;
        --ui-layout-pad-y: 16px;
        --ui-side-panel-w: 288px;
        --ui-history-w: 360px;
        --ui-modal-max: 560px;
        --ui-lightbox-max: 1120px;
        --ui-shadow-sm: 0 2px 12px rgba(17, 24, 39, 0.04);
        --ui-shadow-md: 0 8px 28px rgba(17, 24, 39, 0.08);
        --ui-motion-fast: 160ms;
        --ui-motion-base: 240ms;
        --ui-motion-slow: 360ms;
        --ui-ease-standard: cubic-bezier(0.2, 0.82, 0.2, 1);
      }
      @media (min-width: 768px) {
        :root {
          --ui-font-title: 20px;
          --ui-btn-h: 40px;
          --ui-btn-h-compact: 34px;
          --ui-control-h: 40px;
          --ui-control-h-compact: 36px;
          --ui-textarea-min-h: 220px;
          --ui-header-h: 62px;
          --ui-hero-max: 760px;
          --ui-layout-pad-x: 18px;
          --ui-layout-pad-y: 22px;
          --ui-side-panel-w: 296px;
          --ui-history-w: 400px;
          --ui-modal-max: 600px;
          --ui-lightbox-max: 1180px;
        }
      }
      @media (min-width: 1280px) {
        :root {
          --ui-font-title: 22px;
          --ui-font-body: 15px;
          --ui-btn-h: 42px;
          --ui-btn-h-compact: 35px;
          --ui-control-h: 42px;
          --ui-control-h-compact: 36px;
          --ui-textarea-min-h: 244px;
          --ui-header-h: 64px;
          --ui-hero-max: 820px;
          --ui-layout-pad-x: 24px;
          --ui-layout-pad-y: 28px;
          --ui-side-panel-w: 304px;
          --ui-history-w: 420px;
          --ui-modal-max: 640px;
          --ui-lightbox-max: 1240px;
        }
      }
      body {
        font-family: 'Manrope', 'PingFang SC', 'Noto Sans SC', sans-serif;
        background: var(--ui-bg);
        color: var(--ui-text-primary);
        text-rendering: optimizeLegibility;
        -webkit-font-smoothing: antialiased;
      }
      .ui-app {
        background: radial-gradient(1200px 380px at 50% -20%, rgba(7, 193, 96, 0.08), transparent 68%), var(--ui-app);
      }
      .ui-surface {
        background: var(--ui-surface);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-lg);
        box-shadow: var(--ui-shadow-sm);
        transition: box-shadow var(--ui-motion-base) var(--ui-ease-standard), border-color var(--ui-motion-base) var(--ui-ease-standard);
      }
      .ui-surface-soft {
        background: var(--ui-surface-soft);
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-md);
        transition: background-color var(--ui-motion-base) var(--ui-ease-standard), border-color var(--ui-motion-base) var(--ui-ease-standard);
      }
      .ui-header {
        background: rgba(255, 255, 255, 0.92);
        border-bottom: 1px solid var(--ui-border);
        backdrop-filter: blur(8px);
      }
      .ui-title {
        font-size: var(--ui-font-title);
        color: var(--ui-text-primary);
        line-height: 1.35;
        letter-spacing: 0.01em;
      }
      .ui-meta {
        font-size: var(--ui-font-meta);
        color: var(--ui-text-muted);
      }
      .ui-btn-primary {
        height: var(--ui-btn-h);
        padding: 0 16px;
        border-radius: var(--ui-radius-sm);
        border: 1px solid #06ad57;
        background: var(--ui-accent);
        color: var(--ui-text-inverse);
        font-size: 13px;
        font-weight: 600;
        transition: transform var(--ui-motion-fast) var(--ui-ease-standard), box-shadow var(--ui-motion-fast) var(--ui-ease-standard), background-color var(--ui-motion-fast) var(--ui-ease-standard), border-color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-btn-primary:hover {
        background: #06b05a;
        border-color: #059f51;
        box-shadow: 0 4px 14px rgba(7, 193, 96, 0.22);
      }
      .ui-btn-primary:active {
        transform: translateY(1px) scale(0.995);
        box-shadow: 0 2px 8px rgba(7, 193, 96, 0.18);
      }
      .ui-btn-primary:disabled {
        opacity: 0.45;
        cursor: not-allowed;
        box-shadow: none;
      }
      .ui-btn-secondary {
        height: var(--ui-btn-h);
        padding: 0 14px;
        border-radius: var(--ui-radius-sm);
        border: 1px solid var(--ui-border);
        background: #fff;
        color: var(--ui-text-secondary);
        font-size: 12px;
        transition: transform var(--ui-motion-fast) var(--ui-ease-standard), border-color var(--ui-motion-fast) var(--ui-ease-standard), background-color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-btn-secondary:hover {
        border-color: var(--ui-border-strong);
        color: var(--ui-text-primary);
        background: #f7f8fa;
      }
      .ui-btn-secondary:active {
        transform: translateY(1px);
      }
      .ui-btn-link {
        font-size: 12px;
        color: var(--ui-text-muted);
        transition: color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-btn-link:hover {
        color: var(--ui-text-secondary);
      }
      .ui-field-label {
        font-size: var(--ui-font-meta);
        color: var(--ui-text-muted);
        letter-spacing: 0.02em;
      }
      .ui-input,
      .ui-select,
      .ui-textarea {
        width: 100%;
        border-radius: var(--ui-radius-sm);
        border: 1px solid var(--ui-border);
        background: #fff;
        color: var(--ui-text-secondary);
        font-size: var(--ui-font-body);
        transition: border-color 0.2s ease, box-shadow 0.2s ease;
      }
      .ui-input,
      .ui-select {
        height: var(--ui-control-h);
        padding: 0 12px;
      }
      .ui-textarea {
        min-height: var(--ui-textarea-min-h);
        padding: 14px;
        resize: none;
        line-height: 1.7;
      }
      .ui-input:focus,
      .ui-select:focus,
      .ui-textarea:focus {
        outline: none;
        border-color: rgba(7, 193, 96, 0.45);
        box-shadow: 0 0 0 3px rgba(7, 193, 96, 0.12);
      }
      .ui-chip {
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-sm);
        background: #fff;
        color: var(--ui-text-muted);
        font-size: 12px;
        padding: 8px 10px;
        text-align: left;
        transition: transform var(--ui-motion-fast) var(--ui-ease-standard), border-color var(--ui-motion-fast) var(--ui-ease-standard), background-color var(--ui-motion-fast) var(--ui-ease-standard), color var(--ui-motion-fast) var(--ui-ease-standard);
      }
      .ui-chip:hover {
        border-color: var(--ui-border-strong);
        color: var(--ui-text-secondary);
        background: #f8fafc;
      }
      .ui-chip:active {
        transform: translateY(1px);
      }
      .ui-chip-active {
        border-color: rgba(7, 193, 96, 0.45);
        color: #05964d;
        background: var(--ui-accent-soft);
      }
      .ui-modal {
        background: #fff;
        border: 1px solid var(--ui-border);
        border-radius: var(--ui-radius-lg);
        box-shadow: 0 18px 42px rgba(17, 24, 39, 0.16);
      }
      .ui-tag {
        display: inline-flex;
        align-items: center;
        gap: 4px;
        padding: 2px 8px;
        border-radius: var(--ui-radius-pill);
        border: 1px solid var(--ui-border);
        background: #fff;
        color: var(--ui-text-secondary);
        font-size: 11px;
      }
      .ui-tag-info {
        border-color: rgba(7, 193, 96, 0.32);
        background: var(--ui-accent-soft);
        color: #05964d;
      }
      .ui-tag-success {
        border-color: rgba(7, 193, 96, 0.35);
        background: rgba(7, 193, 96, 0.09);
        color: var(--ui-success);
      }
      .ui-tag-muted {
        color: var(--ui-text-muted);
      }
      ::-webkit-scrollbar {
        width: 8px;
        height: 8px;
      }
      ::-webkit-scrollbar-track {
        background: #eceff3;
      }
      ::-webkit-scrollbar-thumb {
        background: #c4cad4;
        border-radius: 4px;
      }
      ::-webkit-scrollbar-thumb:hover {
        background: #aeb6c2;
      }

      @keyframes progress {
        0% { transform: translateX(-100%); }
        100% { transform: translateX(100%); }
      }
      .animate-progress {
        animation: progress 1.8s ease-in-out infinite;
      }

      @keyframes rise-fade {
        0% { transform: translateY(6px); opacity: 0; }
        100% { transform: translateY(0); opacity: 1; }
      }
      .animate-rise-fade {
        animation: rise-fade 420ms ease-out both;
      }
      .ui-card-lift {
        transition: transform var(--ui-motion-base) var(--ui-ease-standard), box-shadow var(--ui-motion-base) var(--ui-ease-standard), border-color var(--ui-motion-base) var(--ui-ease-standard);
      }
      .ui-card-lift:hover {
        transform: translateY(-2px);
        box-shadow: var(--ui-shadow-md);
      }
      .ui-reveal {
        animation: rise-fade var(--ui-motion-slow) var(--ui-ease-standard) both;
      }
      .ui-numeric {
        font-variant-numeric: tabular-nums;
      }
      .ui-kicker {
        font-size: 11px;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }
      .ui-shell-pad {
        padding-left: var(--ui-layout-pad-x);
        padding-right: var(--ui-layout-pad-x);
        padding-top: var(--ui-layout-pad-y);
        padding-bottom: var(--ui-layout-pad-y);
      }
      .ui-header-h {
        height: var(--ui-header-h);
      }
      .ui-header-pad {
        padding-left: var(--ui-layout-pad-x);
        padding-right: var(--ui-layout-pad-x);
      }
      .ui-hero {
        max-width: var(--ui-hero-max);
      }
      .ui-modal-shell {
        width: 100%;
        max-width: var(--ui-modal-max);
      }
      .ui-history-drawer {
        width: min(92vw, var(--ui-history-w));
      }
      .ui-lightbox-body {
        width: 100%;
        max-width: var(--ui-lightbox-max);
      }
      .ui-preview-shadow {
        box-shadow: 0 14px 38px rgba(17, 24, 39, 0.26);
      }
      .ui-btn-compact {
        height: var(--ui-btn-h-compact) !important;
        font-size: 11px;
      }
      .ui-select-compact {
        height: var(--ui-control-h-compact) !important;
      }
      .ui-input-hero {
        min-height: var(--ui-textarea-min-h) !important;
      }
      .ui-planning-grid {
        display: grid;
        grid-template-columns: minmax(0, 1fr);
        gap: var(--ui-space-4);
      }
      @media (min-width: 1280px) {
        .ui-planning-grid {
          grid-template-columns: minmax(0, 1fr) var(--ui-side-panel-w);
        }
      }
      .ui-fieldset summary {
        list-style: none;
      }
      .ui-fieldset summary::-webkit-details-marker {
        display: none;
      }
      .ui-fieldset summary::after {
        content: '展开';
        margin-left: auto;
        font-size: 11px;
        color: var(--ui-text-muted);
      }
      .ui-fieldset[open] summary::after {
        content: '收起';
      }
      :focus-visible {
        outline: 2px solid rgba(7, 193, 96, 0.35);
        outline-offset: 2px;
      }

      @media (prefers-reduced-motion: reduce) {
        * {
          animation-duration: 0.01ms !important;
          animation-iteration-count: 1 !important;
          transition-duration: 0.01ms !important;
        }
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
