  <rect x="420" y="180" width="380" height="70" class="box"/>
  <text x="440" y="222" class="label">PlanningWorkspace / Gallery / Sidebar</text>

  <rect x="840" y="180" width="360" height="70" class="box"/>
  <text x="860" y="222" class="label">UI Events (start/select/retry/reset)</text>

  <rect x="80" y="350" width="420" height="80" class="box2"/>
  <text x="100" y="395" class="label">useStudioArchitect (thin facade)</text>

  <rect x="520" y="350" width="250" height="80" class="box3"/>
  <text x="540" y="395" class="label">useStudioInfra</text>

  <rect x="790" y="350" width="230" height="80" class="box3"/>
  <text x="810" y="395" class="label">useHistorySync</text>

  <rect x="1040" y="350" width="230" height="80" class="box3"/>
  <text x="1060" y="395" class="label">useAutoCuration</text>

  <rect x="1290" y="350" width="230" height="80" class="box3"/>
  <text x="1310" y="395" class="label">useConceptSelection</text>

  <rect x="1540" y="350" width="190" height="80" class="box3"/>
  <text x="1560" y="395" class="label">useUxMetrics</text>

  <rect x="80" y="450" width="350" height="80" class="box4"/>
  <text x="100" y="495" class="label">useWorkflowMachine</text>

  <rect x="450" y="450" width="380" height="80" class="box4"/>
  <text x="470" y="495" class="label">usePlanningWorkflow</text>

  <rect x="850" y="450" width="380" height="80" class="box4"/>
  <text x="870" y="495" class="label">useShootingWorkflow</text>

  <rect x="80" y="650" width="420" height="90" class="box"/>
  <text x="100" y="690" class="label">domain/workflow/sessionOrchestrator</text>
  <text x="100" y="715" class="small">buildConceptProposalFrames / buildShootFrames / syncPlan</text>

  <rect x="520" y="650" width="320" height="90" class="box"/>
  <text x="540" y="700" class="label">services/public.ts</text>

  <rect x="860" y="650" width="400" height="90" class="box"/>
  <text x="880" y="700" class="label">useDarkroom + useHistory</text>

  <rect x="1280" y="650" width="450" height="90" class="box"/>
  <text x="1300" y="690" class="label">routing/policy + executionPolicy</text>
  <text x="1300" y="715" class="small">resolveRuntimeStrategy / selectFrameModelType</text>

  <rect x="80" y="760" width="400" height="90" class="box"/>
  <text x="100" y="810" class="label">masterSessionPolicy</text>

  <rect x="500" y="760" width="520" height="90" class="box"/>
  <text x="520" y="810" class="label">DirectorEngine / CameraEngine</text>

  <rect x="1040" y="760" width="690" height="90" class="box"/>
  <text x="1060" y="810" class="label">Infrastructure API Client + Gateway</text>

  <rect x="80" y="960" width="520" height="110" class="box5"/>
  <text x="100" y="1005" class="label">Local persistence</text>
  <text x="100" y="1030" class="text">dbService / History storage / blob hydration</text>

  <rect x="620" y="960" width="520" height="110" class="box5"/>
  <text x="640" y="1005" class="label">Provider runtime</text>
  <text x="640" y="1030" class="text">model routing / retries / fallback / rate-limit handling</text>

  <rect x="1160" y="960" width="560" height="110" class="box5"/>
  <text x="1180" y="1005" class="label">Image/Text providers</text>
  <text x="1180" y="1030" class="text">OpenAI / Google / Ali / Byte / MiniMax / Zhipu</text>

