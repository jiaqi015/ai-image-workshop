<svg xmlns="http://www.w3.org/2000/svg" width="1800" height="1160" viewBox="0 0 1800 1160">
  <defs>
    <style>
      .title { font: 700 36px 'Arial'; fill: #f5f5f5; }
      .subtitle { font: 500 16px 'Arial'; fill: #a1a1aa; }
      .layer { fill: #111827; stroke: #374151; stroke-width: 2; rx: 16; }
      .box { fill: #0f172a; stroke: #64748b; stroke-width: 2; rx: 12; }
      .box2 { fill: #1e1b4b; stroke: #818cf8; stroke-width: 2; rx: 12; }
      .box3 { fill: #052e16; stroke: #34d399; stroke-width: 2; rx: 12; }
      .box4 { fill: #3f1d2e; stroke: #f472b6; stroke-width: 2; rx: 12; }
      .box5 { fill: #3f3f46; stroke: #a1a1aa; stroke-width: 2; rx: 12; }
      .label { font: 700 20px 'Arial'; fill: #f8fafc; }
      .text { font: 500 15px 'Arial'; fill: #cbd5e1; }
      .small { font: 500 13px 'Arial'; fill: #94a3b8; }
      .arrow { stroke: #94a3b8; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead); }
      .arrow2 { stroke: #34d399; stroke-width: 2.5; fill: none; marker-end: url(#arrowhead2); }
    </style>
    <marker id="arrowhead" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#94a3b8" />
    </marker>
    <marker id="arrowhead2" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#34d399" />
    </marker>
  </defs>

  <rect width="1800" height="1160" fill="#09090b"/>
  <text x="60" y="68" class="title">AI Studio Architecture (Refactored)</text>
  <text x="60" y="98" class="subtitle">Single-pass structure: facade + orchestration + policies + infra</text>

  <rect x="40" y="130" width="1720" height="150" class="layer"/>
  <text x="60" y="160" class="label">Presentation Layer</text>

  <rect x="40" y="300" width="1720" height="270" class="layer"/>
  <text x="60" y="330" class="label">Orchestration Layer</text>

  <rect x="40" y="590" width="1720" height="280" class="layer"/>
  <text x="60" y="620" class="label">Workflow + Domain Services</text>

  <rect x="40" y="890" width="1720" height="230" class="layer"/>
  <text x="60" y="920" class="label">Engine + Policy + Infra</text>

  <rect x="80" y="180" width="300" height="70" class="box"/>
