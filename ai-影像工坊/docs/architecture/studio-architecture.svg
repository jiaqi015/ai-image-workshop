  <path d="M 290 250 L 290 345" class="arrow"/>
  <path d="M 610 250 L 610 345" class="arrow"/>

  <path d="M 250 430 L 250 448" class="arrow2"/>
  <path d="M 650 430 L 650 448" class="arrow2"/>
  <path d="M 930 430 L 930 448" class="arrow2"/>

  <path d="M 620 530 L 300 650" class="arrow"/>
  <path d="M 640 530 L 680 650" class="arrow"/>
  <path d="M 1030 530 L 1060 650" class="arrow"/>
  <path d="M 1120 530 L 1480 650" class="arrow"/>

  <path d="M 300 740 L 280 760" class="arrow"/>
  <path d="M 700 740 L 760 760" class="arrow"/>
  <path d="M 1160 740 L 1380 760" class="arrow"/>

  <path d="M 760 850 L 860 960" class="arrow"/>
  <path d="M 1300 850 L 1420 960" class="arrow"/>
  <path d="M 980 850 L 980 960" class="arrow"/>

  <text x="80" y="1140" class="small">Generated: hooks split into infra/history/curation/concept/ux + workflow orchestrators.</text>
</svg>
