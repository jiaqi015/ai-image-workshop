name: Refresh BEKE19 research

on:
  schedule:
    - cron: "17 * * * *"
  workflow_dispatch:

concurrency:
  group: beke19-research-refresh
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Check out the watchdog
        uses: actions/checkout@v4

      - name: Use Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Refresh only when the published snapshot is due
        working-directory: ai-影像工坊
        env:
          BEKE19_REFRESH_TOKEN: ${{ secrets.BEKE19_REFRESH_TOKEN }}
          BEKE19_IDEMPOTENCY_KEY: github-${{ github.run_id }}-${{ github.run_attempt }}
          FORCE_REFRESH: ${{ github.event_name == 'workflow_dispatch' }}
          BEKE19_READ_TIMEOUT_MS: 10000
          BEKE19_POST_TIMEOUT_MS: 300000
          BEKE19_RETRY_DELAY_MS: 20000
        run: node scripts/ops/beke19-watchdog.mjs
