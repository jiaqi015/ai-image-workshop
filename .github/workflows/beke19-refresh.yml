name: Refresh BEKE19 research

on:
  schedule:
    - cron: "17 */6 * * *"
  workflow_dispatch:

concurrency:
  group: beke19-research-refresh
  cancel-in-progress: false

jobs:
  refresh:
    runs-on: ubuntu-latest
    timeout-minutes: 6
    steps:
      - name: Publish the next research snapshot
        env:
          BEKE19_REFRESH_TOKEN: ${{ secrets.BEKE19_REFRESH_TOKEN }}
          IDEMPOTENCY_KEY: github-${{ github.run_id }}-${{ github.run_attempt }}
        run: |
          set -euo pipefail
          test -n "$BEKE19_REFRESH_TOKEN"
          response_file="$(mktemp)"
          status_code="$(curl \
            --silent \
            --show-error \
            --max-time 300 \
            --output "$response_file" \
            --write-out '%{http_code}' \
            --request POST \
            --header "Authorization: Bearer $BEKE19_REFRESH_TOKEN" \
            --header "Idempotency-Key: $IDEMPOTENCY_KEY" \
            --header "Accept: application/json" \
            'https://www.cameraclaw.cn/api/beke19?action=refresh')"
          test "$status_code" = "200"
          if ! jq -e '
            .ok == true
            and .state.snapshot.project == "beke19"
            and .state.run.status == "success"
            and .runtime.source == "server-harness"
          ' "$response_file" >/dev/null; then
            jq -r '"refresh failed: source=" + (.runtime.source // "unknown") + " reason=" + (.runtime.degraded.reason // "unknown")' "$response_file" >&2
            exit 1
          fi
          jq -r '"published=" + .state.snapshot.updatedAt + " source=" + .runtime.source' "$response_file"
